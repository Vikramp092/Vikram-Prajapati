name: Test Depreciation Calculator

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run calculator script
      run: |
        python depreciation_calculator_pro.py

    - name: Verify Excel file creation
      run: |
        if [ ! -f "Depreciation_Calculator.xlsx" ]; then
          echo "Excel file not created!"
          exit 1
        fi
        echo "✅ Excel file created successfully"

    - name: Verify Excel file contents
      run: |
        python -c "
        import pandas as pd
        import sys

        try:
            # Check all required sheets exist
            excel_file = pd.ExcelFile('Depreciation_Calculator.xlsx')
            required_sheets = ['Input', 'Companies Act Depreciation', 'Income Tax Depreciation', 'Summary']

            for sheet in required_sheets:
                if sheet not in excel_file.sheet_names:
                    print(f'Missing sheet: {sheet}')
                    sys.exit(1)

            # Check Input sheet has data
            input_df = pd.read_excel(excel_file, sheet_name='Input')
            if len(input_df) == 0:
                print('Input sheet is empty')
                sys.exit(1)

            print('✅ All sheets verified successfully')
        except Exception as e:
            print(f'Error verifying Excel file: {e}')
            sys.exit(1)
        "

    - name: Upload generated Excel file
      uses: actions/upload-artifact@v3
      with:
        name: depreciation-calculator-${{ matrix.python-version }}
        path: Depreciation_Calculator.xlsx